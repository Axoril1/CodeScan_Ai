<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#1a0a00"/>
  <circle cx="50" cy="50" r="45" fill="#2d1200" stroke="#c8860a" stroke-width="3"/>
  <!-- Panda face -->
  <circle cx="50" cy="52" r="28" fill="#f5f5f0"/>
  <!-- Eye patches -->
  <ellipse cx="38" cy="48" rx="10" ry="9" fill="#1a1a1a" transform="rotate(-10 38 48)"/>
  <ellipse cx="62" cy="48" rx="10" ry="9" fill="#1a1a1a" transform="rotate(10 62 48)"/>
  <!-- Eyes -->
  <circle cx="38" cy="48" r="5" fill="#fff"/>
  <circle cx="62" cy="48" r="5" fill="#fff"/>
  <circle cx="39" cy="48" r="3" fill="#1a1a1a"/>
  <circle cx="63" cy="48" r="3" fill="#1a1a1a"/>
  <circle cx="40" cy="46" r="1" fill="#fff"/>
  <circle cx="64" cy="46" r="1" fill="#fff"/>
  <!-- Ears -->
  <circle cx="28" cy="28" r="11" fill="#1a1a1a"/>
  <circle cx="72" cy="28" r="11" fill="#1a1a1a"/>
  <!-- Nose -->
  <ellipse cx="50" cy="58" rx="5" ry="4" fill="#1a1a1a"/>
  <!-- Smile -->
  <path d="M42 65 Q50 72 58 65" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <!-- Gold ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="#ffe066" stroke-width="1" opacity="0.5"/>
</svg>
